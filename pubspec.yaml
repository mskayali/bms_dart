name: jk_bms
description: A robust Flutter plugin for communicating with JK BMS and Daly BMS devices over Bluetooth Low Energy (BLE). Includes protocol parsers for real-time telemetry.
version: 0.1.0
homepage: https://github.com/your-username/jk_bms
repository: https://github.com/your-username/jk_bms
issue_tracker: https://github.com/your-username/jk_bms/issues

environment:
  sdk: ^3.1.3
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter
  universal_ble: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
